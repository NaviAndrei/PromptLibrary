name: Frontend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Quality Gate: Lint and Type Check
  analyze-and-test:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Compile Check (Strict)
        run: npx tsc --noEmit

      - name: ESLint (Code Style & Language Rules)
        run: npx eslint . --ext ts,tsx --report-unused-disable-directives --max-warnings 0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # Build Audit: Production Build Performance
  build-audit:
    name: Production Build Audit
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Build Artifact Audit
        run: |
          echo "### Build Statistics" >> $GITHUB_STEP_SUMMARY
          echo "Total build size: $(du -sh dist/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "JS Chunks: $(ls -l dist/assets/*.js | wc -l)" >> $GITHUB_STEP_SUMMARY
